<!DOCTYPE html>
<html lang="ko" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>CI/CD</title>
    <link rel="stylesheet" href="http://bit.ly/3WJ5ilK" />
</head>
<body>
    <!-- list.html -->
    <h1>Spring Boot <small>CI/CD</small></h1>
    
    <table>
        <tr>
            <th>번호</th>
            <th>업무</th>
            <th>내용</th>
        </tr>
        <tr th:each="entity : ${list}" th:object="${entity}">
            <td th:text="*{seq}"></td>
            <td th:text="*{name}"></td>
            <td th:text="*{description}"></td>
        </tr>
    </table>
    
</body>
</html>
